# Render Blueprint — Mizan Backend API
# Docs: https://render.com/docs/blueprint-spec
# How to use:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Select this repo — Render will read this file automatically

services:
  - type: web
    name: mizan-api
    runtime: python
    region: frankfurt  # closest EU region to Saudi Arabia
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ORIGINS
        value: "https://mizan-invest.vercel.app,https://mizan-invest.com"
    disk:  # Optional persistent disk if you later add SQLite/Postgres
      name: mizan-data
      mountPath: /opt/data
      sizeGB: 1
